# FLOPs	GMACs	Params.(M)
# Adapted from cfgs/scanobjectnn/dgcnn.yaml for Birds.

model:
  NAME: BaseCls
  encoder_args:
    NAME: DGCNN
    in_channels: 3
    channels: 64
    n_classes: 22
    emb_dims: 1024
    n_blocks: 5
    conv: 'edge'
    k: 20
    dropout: 0.5
    norm_args: {'norm': 'bn'}
    act_args: {'act': 'leakyrelu', 'negative_slope': 0.2}
  cls_args:
    NAME: ClsHead
    num_classes: 22
    mlps: [512, 256]
    norm_args:
      norm: 'bn1d'
