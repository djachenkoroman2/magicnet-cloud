# DGCNN for K3DXYZ semantic segmentation.
# Dynamic graph construction is noticeably heavier than PointNet++,
# so we keep the default setup conservative and low-memory.

model:
  NAME: BaseSeg
  encoder_args:
    NAME: DGCNN
    in_channels: 4
    channels: 64
    embed_dim: 1024
    n_blocks: 5
    conv: edge
    k: 20
    knn_max_cdist_mb: 128
    is_seg: True
    norm_args:
      norm: bn
    act_args:
      act: leakyrelu
      negative_slope: 0.2
    conv_args:
      order: conv-norm-act
  cls_args:
    NAME: SegHead
    num_classes: 8
    mlps: [512, 256]
    act_args:
      act: leakyrelu
      negative_slope: 0.2

batch_size: 1
val_batch_size: 1
step_per_update: 2

dataset:
  train:
    voxel_max: 6000
