# PointTransformer for K3DXYZ semantic segmentation.
# This model uses variable-length batches with point offsets (`o`), so it
# needs the concat collate path instead of the default batched `[B, N, C]` flow.

model:
  NAME: PTSeg
  block: PointTransformerBlock
  blocks: [2, 3, 4, 6, 3]
  width: 32
  nsample: [8, 16, 16, 16, 16]
  in_channels: 4
  num_classes: 8
  dec_local_aggr: True
  mid_res: False

feature_keys: pos,heights

batch_size: 1
val_batch_size: 1
step_per_update: 2

dataloader:
  collate_fn: concat_collate_fn

dataset:
  common:
    variable: True
  train:
    voxel_max: 12000

datatransforms:
  train: [PointsToTensor, PointCloudScaling, PointCloudXYZAlign, PointCloudRotation, PointCloudJitter]
  val: [PointsToTensor, PointCloudXYZAlign]
  kwargs:
    gravity_dim: 2
    scale: [0.9, 1.1]
    angle: [0, 0, 1]
    jitter_sigma: 0.005
    jitter_clip: 0.02
